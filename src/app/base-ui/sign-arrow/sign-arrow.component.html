@if (showLabel) {
<p>Type de flèche :</p>
}
<p-select
  [options]="options"
  styleClass="w-100"
  [formControl]="this.arrowControl"
  (onChange)="this.updateArrow()"
  optionLabel="label"
  optionValue="value"
  aria-labelledby="basic"
>
  <ng-template #selectedItem let-selectedOption>
    <i [ngClass]="selectedOption.icon"></i>
  </ng-template>

  <ng-template let-option #item>
    <i [ngClass]="option.icon"></i>
  </ng-template>
</p-select>
